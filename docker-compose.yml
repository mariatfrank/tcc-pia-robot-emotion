services:
  postgres:
    image: postgres:16-alpine
    container_name: pia-robot-postgres
    environment:
      POSTGRES_DB: pia_robot
      POSTGRES_USER: pia_robot
      POSTGRES_PASSWORD: pia_robot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pia_robot -d pia_robot"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pia-robot-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: pia_robot
      RABBITMQ_DEFAULT_PASS: pia_robot
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: pia-robot-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pia_robot
      SPRING_DATASOURCE_USERNAME: pia_robot
      SPRING_DATASOURCE_PASSWORD: pia_robot
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: pia_robot
      SPRING_RABBITMQ_PASSWORD: pia_robot
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      PIA_MAIL_FROM: ${PIA_MAIL_FROM}
    ports:
      - "8080:8080"

volumes:
  postgres-data: