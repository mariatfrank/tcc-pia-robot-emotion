spring:
  application:
    name: pia-robot-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pia_robot}
    username: ${SPRING_DATASOURCE_USERNAME:pia_robot}
    password: ${SPRING_DATASOURCE_PASSWORD:pia_robot}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:pia_robot}
    password: ${SPRING_RABBITMQ_PASSWORD:pia_robot}
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true

pia:
  mail:
    from: ${PIA_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
  rabbit:
    game-events-exchange: pia.robot.game.events
    game-events-queue: pia.robot.game.events.backend
    game-events-routing-key: game.event
    emotion-exchange: pia.robot.emotions
    emotion-queue: pia.robot.emotions.eyes
    emotion-routing-key: emotion.updated

info:
  app:
    name: Piá Robot Emotion Backend
    version: 0.1.0
    description: POC do backend central para sessões, pontuação e emoções.

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: false
